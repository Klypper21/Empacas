<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda - Empacas</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">Empacas</a>
    <button class="hamburger" aria-label="Menú">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="nav-links">
      <a href="tienda.html">Tienda</a>
      <a href="carrito.html">Carrito <span id="cart-count" class="badge">0</span></a>
      <a href="pedidos.html">Mis Pedidos</a>
      <a href="admin.html">Admin</a>
      <button id="btn-login" class="btn btn-outline">Iniciar sesión</button>
      <button id="btn-logout" class="btn btn-outline" style="display:none">Cerrar sesión</button>
    </div>
  </nav>

  <main class="shop-container">
    <h1>Nuestra colección</h1>
    <div id="products-grid" class="products-grid"></div>
  </main>

  <!-- Modal producto: galería, info, calificaciones y reseñas -->
  <div id="product-modal" class="product-modal hidden">
    <div class="product-modal-backdrop"></div>
    <div class="product-modal-content">
      <button class="product-modal-close" aria-label="Cerrar">&times;</button>
      <div class="product-modal-body">
        <div class="product-modal-gallery">
          <div class="product-modal-main-img">
            <img id="modal-main-img" src="" alt="">
          </div>
          <div id="modal-thumbs" class="product-modal-thumbs"></div>
        </div>
        <div class="product-modal-info">
          <h2 id="modal-title"></h2>
          <p id="modal-category" class="product-modal-category"></p>
          <div id="modal-rating" class="product-modal-rating"></div>
          <p id="modal-description" class="product-modal-desc"></p>
          <p id="modal-price" class="product-modal-price"></p>
          <p id="modal-stock" class="product-modal-stock"></p>
          <button id="modal-add-cart" class="btn btn-primary btn-block">Añadir al carrito</button>
          <section class="product-modal-reviews">
            <h3>Reseñas</h3>
            <div id="modal-review-form" class="review-form">
              <p class="review-form-hint" id="review-login-hint">Inicia sesión para escribir una reseña.</p>
              <div id="review-form-fields" class="hidden">
                <div class="review-stars-input" id="review-stars-input">
                  <span data-value="1">★</span><span data-value="2">★</span><span data-value="3">★</span><span data-value="4">★</span><span data-value="5">★</span>
                </div>
                <textarea id="review-comment" placeholder="Escribe tu reseña (opcional)" rows="3"></textarea>
                <button id="review-submit" class="btn btn-primary btn-sm">Enviar reseña</button>
              </div>
            </div>
            <div id="modal-reviews-list" class="reviews-list"></div>
          </section>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/tienda.js"></script>
</body>
</html>
